; VoxelSite Studio — PHP runtime overrides
;
; AI site generation requires long-running PHP processes (2–5 minutes).
; These settings ensure the generation can complete on shared hosting
; where the default max_execution_time is 30 seconds.
;
; These are PHP_INI_PERDIR settings — they apply to all scripts
; in this directory and its subdirectories.
;
; Note: .user.ini files are cached by PHP. Changes take effect after
; user_ini.cache_ttl seconds (default: 300 = 5 minutes).

max_execution_time = 600
max_input_time = 600
